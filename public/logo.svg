<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" width="520" height="120">
  <defs>
    <!-- Gradient pour l'icône data -->
    <linearGradient id="barGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#22d3ee" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
    <!-- Glow filter pour la ligne -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle glow pour le point -->
    <filter id="dotGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- === ICÔNE : Graphique/Data stylisé === -->
  <g transform="translate(12, 14)">
    <!-- Fond subtil de l'icône -->
    <rect x="0" y="0" width="92" height="92" rx="16" fill="#0a0d19" stroke="rgba(36,48,78,0.28)" stroke-width="1"/>

    <!-- Barres du graphique (expositions détectées) -->
    <rect x="16" y="58" width="10" height="22" rx="2" fill="url(#barGrad)" opacity="0.55"/>
    <rect x="30" y="42" width="10" height="38" rx="2" fill="url(#barGrad)" opacity="0.7"/>
    <rect x="44" y="50" width="10" height="30" rx="2" fill="url(#barGrad)" opacity="0.6"/>
    <rect x="58" y="30" width="10" height="50" rx="2" fill="url(#barGrad)" opacity="0.85"/>
    <rect x="72" y="20" width="10" height="60" rx="2" fill="url(#barGrad)" opacity="1"/>

    <!-- Ligne de tendance ascendante (la courbe d'intelligence) -->
    <polyline
      points="21,54 35,38 49,44 63,26 77,16"
      fill="none"
      stroke="url(#lineGrad)"
      stroke-width="2.5"
      stroke-linecap="round"
      stroke-linejoin="round"
      filter="url(#glow)"
    />

    <!-- Point terminal lumineux (le signal) -->
    <circle cx="77" cy="16" r="3.5" fill="#22d3ee" filter="url(#dotGlow)"/>
    <circle cx="77" cy="16" r="1.5" fill="#ffffff"/>
  </g>

  <!-- === TEXTE : Ghost Tax === -->
  <g transform="translate(120, 0)">
    <!-- Nom principal -->
    <text x="0" y="55"
      font-family="'Inter', 'SF Pro Display', 'Segoe UI', system-ui, -apple-system, sans-serif"
      font-size="42"
      font-weight="800"
      letter-spacing="-0.02em"
      fill="#e4e9f4">
      Ghost<tspan fill="#3b82f6" dx="6">Tax</tspan>
    </text>

    <!-- Tagline -->
    <text x="2" y="78"
      font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace"
      font-size="11"
      font-weight="500"
      letter-spacing="0.14em"
      text-transform="uppercase"
      fill="#55637d">
      DECISION INTELLIGENCE
    </text>

    <!-- Ligne d'accent sous la tagline -->
    <rect x="2" y="86" width="60" height="1.5" rx="0.75" fill="url(#lineGrad)" opacity="0.5"/>
  </g>
</svg>
